syntax = "proto3";
package enrichments;
option go_package = "rpc_enrichments/;rpc_enrichments";

message Empty {}

message Alert               { bytes json = 1; }

message EnrichBatchRequest  { repeated Alert alerts = 1; }

message EnrichBatchResponse { repeated Alert alerts = 1; }

service Enrichment {
  rpc Init(Empty)                     returns (Empty);
  rpc EnrichBatch(EnrichBatchRequest) returns (EnrichBatchResponse);
  rpc Shutdown(Empty)                 returns (Empty);
  rpc Ping(Empty)                     returns (Empty);
}
