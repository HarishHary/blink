syntax = "proto3";
package formatters;
option go_package = "rpc_formatters/;rpc_formatters";

message Empty {}

message FormatBatchRequest  { repeated bytes alert_json  = 1; } // one JSON-encoded alerts.Alert per alert

message FormatBatchResponse { repeated bytes result_json = 1; } // one JSON-encoded map[string]any per alert

service Formatter {
  rpc Init(Empty)                     returns (Empty);
  rpc FormatBatch(FormatBatchRequest) returns (FormatBatchResponse);
  rpc Shutdown(Empty)                 returns (Empty);
  rpc Ping(Empty)                     returns (Empty);
}
