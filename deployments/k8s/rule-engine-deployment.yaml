# Rule Engine deployment using Kafka topics for sync and execution
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blink-rule-engine
spec:
  replicas: 3
  selector:
    matchLabels:
      app: blink-rule-engine
  template:
    metadata:
      labels:
        app: blink-rule-engine
    spec:
      containers:
      - name: rule-engine
        image: your-registry/blink:latest
        command: ["/bin/blink-rule-engine"]
        env:
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        - name: KAFKA_TOPIC_SYNC
          value: "blink-sync"
        - name: KAFKA_GROUP_SYNC
          value: "blink-rule-sync"
        - name: KAFKA_TOPIC_EXEC
          value: "blink-exec"
        - name: KAFKA_GROUP_EXEC
          value: "blink-rule-exec"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: blink-rule-engine
spec:
  selector:
    app: blink-rule-engine
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080