# Rule Executor for 'application' log_type
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blink-rule-executor-application
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blink-rule-executor-application
  template:
    metadata:
      labels:
        app: blink-rule-executor-application
    spec:
      readinessProbe:
        httpGet: { path: /health/ready, port: 8080 }
      livenessProbe:
        httpGet: { path: /health/live, port: 8080 }
      containers:
      - name: rule-executor
        image: your-registry/blink:latest
        command: ["/bin/blink-rule-executor"]
        env:
        - name: LOG_TYPE
          value: "application"
        - name: KAFKA_BROKERS
          value: "blink-kafka-bootstrap:9092"
        - name: KAFKA_TOPIC_SYNC
          value: "blink-events-application"
        - name: KAFKA_GROUP_SYNC
          value: "matcher-application"
        - name: KAFKA_TOPIC_EXEC
          value: "blink-exec-application"
        - name: KAFKA_GROUP_EXEC
          value: "rule-exec-application"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: blink-rule-executor-application
spec:
  selector:
    app: blink-rule-executor-application
  ports:
  - name: metrics
    port: 9100
    targetPort: 9100