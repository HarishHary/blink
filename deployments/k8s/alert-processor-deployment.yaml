# Alert Processor deployment using Kafka topics for formatting and dispatching
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blink-alert-processor
spec:
  replicas: 3
  selector:
    matchLabels:
      app: blink-alert-processor
  template:
    metadata:
      labels:
        app: blink-alert-processor
    spec:
      containers:
      - name: alert-processor
        image: your-registry/blink:latest
        command: ["/bin/blink-alert-processor"]
        env:
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        - name: KAFKA_TOPIC_FORMAT
          value: "blink-format"
        - name: KAFKA_GROUP_FORMAT
          value: "blink-alert-format"
        - name: KAFKA_TOPIC_DISPATCH
          value: "blink-dispatch"
        - name: KAFKA_GROUP_DISPATCH
          value: "blink-alert-dispatch"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: blink-alert-processor
spec:
  selector:
    app: blink-alert-processor
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080