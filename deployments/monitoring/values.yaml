namespace: monitoring

prometheus:
  enabled: true
  image:
    repository: prom/prometheus
    tag: "v2.53.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9090
  scrapeInterval: "15s"
  evaluationInterval: "15s"
  retention: "15d"
  persistence:
    enabled: true
    storageClass: ""
    size: 20Gi
  kafkaExporterEnabled: false
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  alerts:
    dlqRateThreshold: 1
    errorRateThreshold: 0.1
    drainLatencyThresholdMs: 5000
    kafkaConsumerLagThreshold: 1000

alertmanager:
  enabled: true
  image:
    repository: prom/alertmanager
    tag: "v0.27.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9093
  persistence:
    enabled: true
    storageClass: ""
    size: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  # Receiver configuration
  slack:
    enabled: false
    apiUrl: ""
    channel: "#blink-alerts"
  email:
    enabled: false
    smarthost: ""
    from: ""
    to: ""
  # Group alerts before firing
  groupWait: "30s"
  groupInterval: "5m"
  repeatInterval: "4h"

grafana:
  enabled: true
  image:
    repository: grafana/grafana
    tag: "11.1.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  ingress:
    enabled: false
    host: grafana.blink.local
    annotations: {}
  persistence:
    enabled: true
    storageClass: ""
    size: 2Gi
  adminPassword: "changeme"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
