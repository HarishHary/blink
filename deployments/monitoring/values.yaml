namespace: monitoring

influxdb:
  enabled: true
  image:
    repository: influxdb
    tag: "1.8"
    pullPolicy: IfNotPresent
  service:
    port: 8086
  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi
  config:
    database: blink
    retentionPolicy: autogen
    retentionDuration: 30d
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

prometheus:
  enabled: true
  image:
    repository: prom/prometheus
    tag: "v2.53.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9090
  scrapeInterval: "15s"
  evaluationInterval: "15s"
  retention: "15d"
  persistence:
    enabled: true
    storageClass: ""
    size: 20Gi
  # Set to true if kafka-exporter is deployed in the kafka namespace
  kafkaExporterEnabled: false
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  alerts:
    dlqRateThreshold: 1          # msg/s
    errorRateThreshold: 0.1      # err/s
    drainLatencyThresholdMs: 5000
    kafkaConsumerLagThreshold: 1000

telegraf:
  enabled: true
  image:
    repository: telegraf
    tag: "1.32"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # Collection interval
  interval: "15s"
  flushInterval: "15s"

chronograf:
  enabled: true
  image:
    repository: chronograf
    tag: "1.10"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8888
  ingress:
    enabled: false
    host: chronograf.blink.local
    annotations: {}
  persistence:
    enabled: true
    storageClass: ""
    size: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # Pre-load dashboards via ConfigMap
  dashboards:
    enabled: true

kapacitor:
  enabled: true
  image:
    repository: kapacitor
    tag: "1.7"
    pullPolicy: IfNotPresent
  service:
    port: 9092
  persistence:
    enabled: true
    storageClass: ""
    size: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Alert channels
  slack:
    enabled: false
    url: ""
    channel: "#alerts"
  # TICKscript alerts
  alerts:
    dlqGrowthThreshold: 100
    errorRateThreshold: 0.05
    latencyThresholdMs: 5000
