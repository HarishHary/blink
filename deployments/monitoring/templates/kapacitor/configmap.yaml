{{- if .Values.kapacitor.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: kapacitor-config
  namespace: {{ .Values.namespace }}
  labels:
    app: kapacitor
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
data:
  kapacitor.conf: |
    hostname = "kapacitor"
    data_dir = "/var/lib/kapacitor"
    skip-config-overrides = false
    default-retention-policy = ""

    [http]
      bind-address = ":9092"
      auth-enabled = false
      log-enabled = true
      write-tracing = false
      pprof-enabled = false
      https-enabled = false

    [[influxdb]]
      enabled = true
      default = true
      name = "default"
      urls = ["http://influxdb.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.influxdb.service.port }}"]
      timeout = 0
      startup-timeout = "5m"
      disable-subscriptions = false
      subscription-protocol = "http"
      subscription-mode = "server"
      kapacitor-hostname = "kapacitor.{{ .Values.namespace }}.svc.cluster.local"
      http-port = 0
      udp-bind = ""
      udp-buffer = 1000
      udp-read-buffer = 0
      [[influxdb.subscriptions]]
      [[influxdb.excluded-subscriptions]]

    [logging]
      file = "STDOUT"
      level = "INFO"

    [load]
      enabled = true
      dir = "/etc/kapacitor/load"

    {{- if .Values.kapacitor.slack.enabled }}
    [slack]
      enabled = true
      default = true
      workspace = "blink"
      url = "{{ .Values.kapacitor.slack.url }}"
      channel = "{{ .Values.kapacitor.slack.channel }}"
      icon-emoji = ":kapacitor:"
      username = "Kapacitor"
      ssl-ca = ""
      ssl-cert = ""
      ssl-key = ""
      insecure-skip-verify = false
      global = false
      state-changes-only = false
    {{- end }}

  dlq-alert.tick: |
    // Alert on DLQ growth above threshold
    var db = 'blink'
    var rp = 'autogen'
    var measurement = 'blink_alert_formatter_alerts_dlq_total'
    var groupBy = []
    var whereFilter = lambda: TRUE
    var period = 5m
    var every = 1m
    var unit = 1s
    var warnThreshold = {{ .Values.kapacitor.alerts.dlqGrowthThreshold }}
    var critThreshold = {{ mul .Values.kapacitor.alerts.dlqGrowthThreshold 5 }}
    var warnReset = 0
    var critReset = 0

    var data = stream
      |from()
        .database(db)
        .retentionPolicy(rp)
        .measurement(measurement)
        .groupBy(groupBy)
        .where(whereFilter)
      |eval(lambda: "value")
        .as('value')
      |derivative('value')
        .as('dlq_rate')
        .unit(unit)
        .nonNegative()
      |alert()
        .id('blink/dlq/{{ "{{" }} .Name {{ "}}" }}')
        .message('DLQ growth: {{ "{{" }} .ID {{ "}}" }} is {{ "{{" }} .Level {{ "}}" }} value: {{ "{{" }} index .Fields "dlq_rate" {{ "}}" }}')
        .warn(lambda: "dlq_rate" > warnThreshold)
        .crit(lambda: "dlq_rate" > critThreshold)
        .warnReset(lambda: "dlq_rate" <= warnReset)
        .critReset(lambda: "dlq_rate" <= critReset)
        .log('/tmp/dlq-alert.log')
        {{- if .Values.kapacitor.slack.enabled }}
        .slack()
        {{- end }}

  error-rate-alert.tick: |
    // Alert on high error rates
    var db = 'blink'
    var rp = 'autogen'
    var measurement = 'blink_alert_formatter_formatter_errors_total'
    var period = 5m
    var every = 1m
    var unit = 1s
    var errThreshold = {{ .Values.kapacitor.alerts.errorRateThreshold }}

    var data = stream
      |from()
        .database(db)
        .retentionPolicy(rp)
        .measurement(measurement)
      |eval(lambda: "value")
        .as('value')
      |derivative('value')
        .as('error_rate')
        .unit(unit)
        .nonNegative()
      |alert()
        .id('blink/errors/{{ "{{" }} .Name {{ "}}" }}')
        .message('High error rate: {{ "{{" }} .ID {{ "}}" }} - rate: {{ "{{" }} index .Fields "error_rate" {{ "}}" }}')
        .warn(lambda: "error_rate" > errThreshold)
        .log('/tmp/error-rate-alert.log')
        {{- if .Values.kapacitor.slack.enabled }}
        .slack()
        {{- end }}

  latency-alert.tick: |
    // Alert on pool drain p99 latency exceeding threshold
    var db = 'blink'
    var rp = 'autogen'
    var measurement = 'blink_pool_drain_duration_milliseconds'
    var period = 5m
    var every = 1m
    var latencyThreshold = {{ .Values.kapacitor.alerts.latencyThresholdMs }}

    var data = stream
      |from()
        .database(db)
        .retentionPolicy(rp)
        .measurement(measurement)
      |window()
        .period(period)
        .every(every)
      |percentile('value', 99.0)
        .as('p99_ms')
      |alert()
        .id('blink/latency/{{ "{{" }} .Name {{ "}}" }}')
        .message('High drain latency: {{ "{{" }} .ID {{ "}}" }} p99={{ "{{" }} index .Fields "p99_ms" {{ "}}" }}ms')
        .warn(lambda: "p99_ms" > latencyThreshold)
        .crit(lambda: "p99_ms" > latencyThreshold * 2)
        .log('/tmp/latency-alert.log')
        {{- if .Values.kapacitor.slack.enabled }}
        .slack()
        {{- end }}
{{- end }}
