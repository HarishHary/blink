{{- if .Values.kapacitor.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: kapacitor
  namespace: {{ .Values.namespace }}
  labels:
    app: kapacitor
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.kapacitor.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    app: kapacitor
{{- end }}
