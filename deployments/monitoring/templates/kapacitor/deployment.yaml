{{- if .Values.kapacitor.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kapacitor
  namespace: {{ .Values.namespace }}
  labels:
    app: kapacitor
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kapacitor
  template:
    metadata:
      labels:
        app: kapacitor
    spec:
      containers:
        - name: kapacitor
          image: {{ .Values.kapacitor.image.repository }}:{{ .Values.kapacitor.image.tag }}
          imagePullPolicy: {{ .Values.kapacitor.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 9092
              protocol: TCP
          env:
            - name: KAPACITOR_INFLUXDB_0_URLS_0
              value: "http://influxdb.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.influxdb.service.port }}"
          volumeMounts:
            - name: config
              mountPath: /etc/kapacitor
            - name: data
              mountPath: /var/lib/kapacitor
          readinessProbe:
            httpGet:
              path: /kapacitor/v1/ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /kapacitor/v1/ping
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.kapacitor.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: kapacitor-config
        - name: data
          {{- if .Values.kapacitor.persistence.enabled }}
          persistentVolumeClaim:
            claimName: kapacitor-data
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
