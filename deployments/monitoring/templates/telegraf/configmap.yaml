{{- if .Values.telegraf.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: telegraf-config
  namespace: {{ .Values.namespace }}
  labels:
    app: telegraf
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
data:
  telegraf.conf: |
    [global_tags]
      environment = "production"
      cluster = "blink"

    [agent]
      interval = "{{ .Values.telegraf.interval }}"
      round_interval = true
      metric_batch_size = 1000
      metric_buffer_limit = 10000
      collection_jitter = "0s"
      flush_interval = "{{ .Values.telegraf.flushInterval }}"
      flush_jitter = "0s"
      precision = ""
      hostname = ""
      omit_hostname = false

    ###############################################################################
    # OUTPUT: InfluxDB
    ###############################################################################
    [[outputs.influxdb]]
      urls = ["http://influxdb.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.influxdb.service.port }}"]
      database = "{{ .Values.influxdb.config.database }}"
      retention_policy = ""
      write_consistency = "any"
      timeout = "5s"

    ###############################################################################
    # INPUT: Prometheus federation endpoint
    # Pull all blink_* and kafka_* metrics from the Prometheus server so
    # Telegraf bridges them into InfluxDB for Chronograf / Kapacitor.
    ###############################################################################
    [[inputs.prometheus]]
      urls = ["http://prometheus.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.prometheus.service.port }}/federate"]
      metric_version = 2
      # Only federate the metric families we care about to avoid noise
      [inputs.prometheus.http_headers]
        match[] = "{job=~\"blink-.*\"}"
        match[] = "{job=\"kafka\"}"
      [inputs.prometheus.tags]
        source = "prometheus-federation"

    ###############################################################################
    # INPUT: Internal telegraf stats
    ###############################################################################
    [[inputs.internal]]
      collect_memstats = false
{{- end }}
