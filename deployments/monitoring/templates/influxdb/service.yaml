{{- if .Values.influxdb.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: influxdb
  namespace: {{ .Values.namespace }}
  labels:
    app: influxdb
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.influxdb.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    app: influxdb
{{- end }}
