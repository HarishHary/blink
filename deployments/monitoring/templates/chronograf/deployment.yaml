{{- if .Values.chronograf.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chronograf
  namespace: {{ .Values.namespace }}
  labels:
    app: chronograf
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chronograf
  template:
    metadata:
      labels:
        app: chronograf
    spec:
      initContainers:
        {{- if .Values.chronograf.dashboards.enabled }}
        - name: load-dashboards
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for Chronograf to be ready..."
              until curl -sf http://chronograf:{{ .Values.chronograf.service.port }}/ping; do
                sleep 2
              done
              echo "Loading dashboards..."
              for f in /dashboards/*.json; do
                echo "Importing $f..."
                curl -sf -X POST \
                  -H "Content-Type: application/json" \
                  -d @"$f" \
                  "http://chronograf:{{ .Values.chronograf.service.port }}/chronograf/v1/dashboards" || true
              done
              echo "Dashboards loaded."
          volumeMounts:
            - name: dashboards
              mountPath: /dashboards
        {{- end }}
      containers:
        - name: chronograf
          image: {{ .Values.chronograf.image.repository }}:{{ .Values.chronograf.image.tag }}
          imagePullPolicy: {{ .Values.chronograf.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8888
              protocol: TCP
          env:
            - name: INFLUXDB_URL
              value: "http://influxdb.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.influxdb.service.port }}"
            - name: KAPACITOR_URL
              value: "http://kapacitor.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.kapacitor.service.port }}"
          volumeMounts:
            - name: data
              mountPath: /var/lib/chronograf
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.chronograf.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.chronograf.persistence.enabled }}
          persistentVolumeClaim:
            claimName: chronograf-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.chronograf.dashboards.enabled }}
        - name: dashboards
          configMap:
            name: chronograf-dashboards
        {{- end }}
{{- end }}
