{{- if and .Values.chronograf.enabled .Values.chronograf.dashboards.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: chronograf-dashboards
  namespace: {{ .Values.namespace }}
  labels:
    app: chronograf
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
data:
  blink-overview.json: |
    {
      "id": "blink-overview",
      "meta": {
        "defaultGroupBy": "10s",
        "measurementField": "measurement"
      },
      "data": {
        "cells": [
          {
            "i": "cell-alert-rate",
            "x": 0, "y": 0, "w": 4, "h": 4,
            "name": "Alert Rate (per minute)",
            "queries": [
              {
                "query": "SELECT non_negative_derivative(max(\"value\"), 1m) AS \"alerts/min\" FROM \"blink\".\"autogen\".\"blink_alert_formatter_alerts_out_total\" WHERE time > :dashboardTime: GROUP BY time(:interval:) FILL(0)",
                "label": "alerts/min"
              }
            ],
            "axes": {
              "x": {"bounds": ["", ""], "label": "", "prefix": "", "suffix": "", "base": "10", "scale": "linear"},
              "y": {"bounds": ["0", ""], "label": "Alerts/min", "prefix": "", "suffix": "", "base": "10", "scale": "linear"},
              "y2": {"bounds": ["", ""], "label": "", "prefix": "", "suffix": "", "base": "10", "scale": "linear"}
            },
            "type": "line",
            "colors": [
              {"id": "c1", "type": "scale", "hex": "#31C0F6", "name": "Nineteen Eighty Four", "value": "0"},
              {"id": "c2", "type": "scale", "hex": "#A500A5", "name": "Nineteen Eighty Four", "value": "0"}
            ],
            "legend": {"type": "static", "orientation": "bottom"},
            "tableOptions": {"verticalTimeAxis": true, "sortBy": {"internalName": "time", "displayName": "", "visible": true}, "wrapping": "truncate", "fixFirstColumn": true},
            "fieldOptions": [],
            "timeFormat": "MM/DD/YYYY HH:mm:ss",
            "decimalPlaces": {"isEnforced": true, "digits": 2},
            "note": "",
            "noteVisibility": "default"
          },
          {
            "i": "cell-dlq-size",
            "x": 4, "y": 0, "w": 4, "h": 4,
            "name": "Dead Letter Queue Growth",
            "queries": [
              {
                "query": "SELECT non_negative_derivative(max(\"value\"), 1m) AS \"dlq/min\" FROM \"blink\".\"autogen\".\"blink_alert_formatter_alerts_dlq_total\" WHERE time > :dashboardTime: GROUP BY time(:interval:) FILL(0)",
                "label": "DLQ/min"
              }
            ],
            "axes": {
              "x": {"bounds": ["", ""], "label": "", "prefix": "", "suffix": "", "base": "10", "scale": "linear"},
              "y": {"bounds": ["0", ""], "label": "DLQ Messages/min", "prefix": "", "suffix": "", "base": "10", "scale": "linear"},
              "y2": {"bounds": ["", ""], "label": "", "prefix": "", "suffix": "", "base": "10", "scale": "linear"}
            },
            "type": "line",
            "colors": [
              {"id": "c1", "type": "scale", "hex": "#FF5373", "name": "Ruby", "value": "0"}
            ],
            "legend": {"type": "static", "orientation": "bottom"},
            "tableOptions": {"verticalTimeAxis": true, "sortBy": {"internalName": "time", "displayName": "", "visible": true}, "wrapping": "truncate", "fixFirstColumn": true},
            "fieldOptions": [],
            "timeFormat": "MM/DD/YYYY HH:mm:ss",
            "decimalPlaces": {"isEnforced": true, "digits": 2},
            "note": "Rising DLQ indicates processing errors in the pipeline",
            "noteVisibility": "showWhenNoData"
          },
          {
            "i": "cell-error-rate",
            "x": 8, "y": 0, "w": 4, "h": 4,
            "name": "Error Rate",
            "queries": [
              {
                "query": "SELECT non_negative_derivative(max(\"value\"), 1m) AS \"errors/min\" FROM \"blink\".\"autogen\".\"blink_alert_formatter_formatter_errors_total\" WHERE time > :dashboardTime: GROUP BY time(:interval:) FILL(0)",
                "label": "Errors/min"
              }
            ],
            "axes": {
              "x": {"bounds": ["", ""], "label": "", "prefix": "", "suffix": "", "base": "10", "scale": "linear"},
              "y": {"bounds": ["0", ""], "label": "Errors/min", "prefix": "", "suffix": "", "base": "10", "scale": "linear"},
              "y2": {"bounds": ["", ""], "label": "", "prefix": "", "suffix": "", "base": "10", "scale": "linear"}
            },
            "type": "line",
            "colors": [
              {"id": "c1", "type": "scale", "hex": "#FF5373", "name": "Ruby", "value": "0"}
            ],
            "legend": {"type": "static", "orientation": "bottom"},
            "tableOptions": {"verticalTimeAxis": true, "sortBy": {"internalName": "time", "displayName": "", "visible": true}, "wrapping": "truncate", "fixFirstColumn": true},
            "fieldOptions": [],
            "timeFormat": "MM/DD/YYYY HH:mm:ss",
            "decimalPlaces": {"isEnforced": true, "digits": 2},
            "note": "",
            "noteVisibility": "default"
          },
          {
            "i": "cell-pipeline-throughput",
            "x": 0, "y": 4, "w": 6, "h": 4,
            "name": "Pipeline Throughput",
            "queries": [
              {
                "query": "SELECT non_negative_derivative(max(\"value\"), 1m) AS \"in/min\" FROM \"blink\".\"autogen\".\"blink_alert_merger_alerts_in_total\" WHERE time > :dashboardTime: GROUP BY time(:interval:) FILL(0)",
                "label": "Merger In/min"
              },
              {
                "query": "SELECT non_negative_derivative(max(\"value\"), 1m) AS \"out/min\" FROM \"blink\".\"autogen\".\"blink_alert_merger_alerts_out_total\" WHERE time > :dashboardTime: GROUP BY time(:interval:) FILL(0)",
                "label": "Merger Out/min"
              }
            ],
            "axes": {
              "x": {"bounds": ["", ""], "label": "", "prefix": "", "suffix": "", "base": "10", "scale": "linear"},
              "y": {"bounds": ["0", ""], "label": "Alerts/min", "prefix": "", "suffix": "", "base": "10", "scale": "linear"},
              "y2": {"bounds": ["", ""], "label": "", "prefix": "", "suffix": "", "base": "10", "scale": "linear"}
            },
            "type": "line",
            "colors": [
              {"id": "c1", "type": "scale", "hex": "#31C0F6", "name": "Nineteen Eighty Four", "value": "0"},
              {"id": "c2", "type": "scale", "hex": "#A500A5", "name": "Nineteen Eighty Four", "value": "0"}
            ],
            "legend": {"type": "static", "orientation": "bottom"},
            "tableOptions": {"verticalTimeAxis": true, "sortBy": {"internalName": "time", "displayName": "", "visible": true}, "wrapping": "truncate", "fixFirstColumn": true},
            "fieldOptions": [],
            "timeFormat": "MM/DD/YYYY HH:mm:ss",
            "decimalPlaces": {"isEnforced": true, "digits": 2},
            "note": "",
            "noteVisibility": "default"
          },
          {
            "i": "cell-pool-inflight",
            "x": 6, "y": 4, "w": 6, "h": 4,
            "name": "Pool Inflight Tasks",
            "queries": [
              {
                "query": "SELECT mean(\"gauge\") AS \"inflight\" FROM \"blink\".\"autogen\".\"blink_pool_inflight\" WHERE time > :dashboardTime: GROUP BY time(:interval:), service FILL(previous)",
                "label": "Inflight Tasks"
              }
            ],
            "axes": {
              "x": {"bounds": ["", ""], "label": "", "prefix": "", "suffix": "", "base": "10", "scale": "linear"},
              "y": {"bounds": ["0", ""], "label": "Tasks", "prefix": "", "suffix": "", "base": "10", "scale": "linear"},
              "y2": {"bounds": ["", ""], "label": "", "prefix": "", "suffix": "", "base": "10", "scale": "linear"}
            },
            "type": "line",
            "colors": [
              {"id": "c1", "type": "scale", "hex": "#4ED8A0", "name": "Color Zero", "value": "0"}
            ],
            "legend": {"type": "static", "orientation": "bottom"},
            "tableOptions": {"verticalTimeAxis": true, "sortBy": {"internalName": "time", "displayName": "", "visible": true}, "wrapping": "truncate", "fixFirstColumn": true},
            "fieldOptions": [],
            "timeFormat": "MM/DD/YYYY HH:mm:ss",
            "decimalPlaces": {"isEnforced": true, "digits": 2},
            "note": "",
            "noteVisibility": "default"
          }
        ],
        "templates": [
          {
            "tempVar": ":service:",
            "id": "tpl-service",
            "type": "tagValues",
            "label": "service",
            "values": [],
            "query": {
              "influxql": "SHOW TAG VALUES ON \"blink\" FROM /blink_.*/ WITH KEY = \"service\"",
              "db": "blink",
              "measurement": "",
              "tagKey": "service",
              "fieldKey": ""
            }
          }
        ],
        "name": "Blink Overview",
        "refreshRate": "15s",
        "timeRange": {"upper": null, "lower": "now() - 1h"},
        "labels": ["blink", "monitoring"]
      }
    }
  kafka-pipeline.json: |
    {
      "id": "kafka-pipeline",
      "meta": {
        "defaultGroupBy": "10s",
        "measurementField": "measurement"
      },
      "data": {
        "cells": [
          {
            "i": "cell-kafka-consumer-lag",
            "x": 0, "y": 0, "w": 12, "h": 4,
            "name": "Kafka Consumer Lag by Topic",
            "queries": [
              {
                "query": "SELECT mean(\"consumer_lag\") AS \"lag\" FROM \"blink\".\"autogen\".\"kafka_consumer_group\" WHERE time > :dashboardTime: AND topic =~ /:topic:/ GROUP BY time(:interval:), topic FILL(previous)",
                "label": "Consumer Lag"
              }
            ],
            "axes": {
              "x": {"bounds": ["", ""], "label": "", "prefix": "", "suffix": "", "base": "10", "scale": "linear"},
              "y": {"bounds": ["0", ""], "label": "Message Lag", "prefix": "", "suffix": "", "base": "10", "scale": "linear"},
              "y2": {"bounds": ["", ""], "label": "", "prefix": "", "suffix": "", "base": "10", "scale": "linear"}
            },
            "type": "line",
            "colors": [
              {"id": "c1", "type": "scale", "hex": "#31C0F6", "name": "Nineteen Eighty Four", "value": "0"}
            ],
            "legend": {"type": "static", "orientation": "bottom"},
            "tableOptions": {"verticalTimeAxis": true, "sortBy": {"internalName": "time", "displayName": "", "visible": true}, "wrapping": "truncate", "fixFirstColumn": true},
            "fieldOptions": [],
            "timeFormat": "MM/DD/YYYY HH:mm:ss",
            "decimalPlaces": {"isEnforced": false, "digits": 2},
            "note": "Growing lag indicates consumers are falling behind",
            "noteVisibility": "showWhenNoData"
          },
          {
            "i": "cell-dlq-topic-sizes",
            "x": 0, "y": 4, "w": 6, "h": 4,
            "name": "DLQ Topic Sizes",
            "queries": [
              {
                "query": "SELECT mean(\"partition_current_offset\") AS \"offset\" FROM \"blink\".\"autogen\".\"kafka_topics\" WHERE time > :dashboardTime: AND topic =~ /dlq/ GROUP BY time(:interval:), topic FILL(previous)",
                "label": "DLQ Offsets"
              }
            ],
            "axes": {
              "x": {"bounds": ["", ""], "label": "", "prefix": "", "suffix": "", "base": "10", "scale": "linear"},
              "y": {"bounds": ["0", ""], "label": "Messages", "prefix": "", "suffix": "", "base": "10", "scale": "linear"},
              "y2": {"bounds": ["", ""], "label": "", "prefix": "", "suffix": "", "base": "10", "scale": "linear"}
            },
            "type": "line",
            "colors": [
              {"id": "c1", "type": "scale", "hex": "#FF5373", "name": "Ruby", "value": "0"}
            ],
            "legend": {"type": "static", "orientation": "bottom"},
            "tableOptions": {"verticalTimeAxis": true, "sortBy": {"internalName": "time", "displayName": "", "visible": true}, "wrapping": "truncate", "fixFirstColumn": true},
            "fieldOptions": [],
            "timeFormat": "MM/DD/YYYY HH:mm:ss",
            "decimalPlaces": {"isEnforced": false, "digits": 2},
            "note": "Any growth in DLQ size requires investigation",
            "noteVisibility": "showWhenNoData"
          },
          {
            "i": "cell-kafka-topic-throughput",
            "x": 6, "y": 4, "w": 6, "h": 4,
            "name": "Topic Throughput",
            "queries": [
              {
                "query": "SELECT non_negative_derivative(mean(\"partition_current_offset\"), 1m) AS \"msgs/min\" FROM \"blink\".\"autogen\".\"kafka_topics\" WHERE time > :dashboardTime: AND topic !~ /dlq/ GROUP BY time(:interval:), topic FILL(0)",
                "label": "Messages/min"
              }
            ],
            "axes": {
              "x": {"bounds": ["", ""], "label": "", "prefix": "", "suffix": "", "base": "10", "scale": "linear"},
              "y": {"bounds": ["0", ""], "label": "Messages/min", "prefix": "", "suffix": "", "base": "10", "scale": "linear"},
              "y2": {"bounds": ["", ""], "label": "", "prefix": "", "suffix": "", "base": "10", "scale": "linear"}
            },
            "type": "line",
            "colors": [
              {"id": "c1", "type": "scale", "hex": "#4ED8A0", "name": "Color Zero", "value": "0"}
            ],
            "legend": {"type": "static", "orientation": "bottom"},
            "tableOptions": {"verticalTimeAxis": true, "sortBy": {"internalName": "time", "displayName": "", "visible": true}, "wrapping": "truncate", "fixFirstColumn": true},
            "fieldOptions": [],
            "timeFormat": "MM/DD/YYYY HH:mm:ss",
            "decimalPlaces": {"isEnforced": false, "digits": 2},
            "note": "",
            "noteVisibility": "default"
          }
        ],
        "templates": [
          {
            "tempVar": ":topic:",
            "id": "tpl-topic",
            "type": "tagValues",
            "label": "topic",
            "values": [],
            "query": {
              "influxql": "SHOW TAG VALUES ON \"blink\" FROM \"kafka_topics\" WITH KEY = \"topic\"",
              "db": "blink",
              "measurement": "kafka_topics",
              "tagKey": "topic",
              "fieldKey": ""
            }
          }
        ],
        "name": "Kafka Pipeline",
        "refreshRate": "15s",
        "timeRange": {"upper": null, "lower": "now() - 1h"},
        "labels": ["blink", "kafka", "monitoring"]
      }
    }
{{- end }}
