---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blink-event-matcher-application
  namespace: blink
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blink-event-matcher-application
  template:
    metadata:
      labels:
        app: blink-event-matcher-application
    spec:
      containers:
        - name: event-matcher
          image: localhost/blink-event-matcher:latest
          imagePullPolicy: Never
          command: ["/bin/blink-event-matcher"]
          envFrom:
            - configMapRef:
                name: blink-config
            - secretRef:
                name: blink-auth
          env:
            - name: APP_NAME
              value: "event-matcher-application"
            - name: KAFKA_TOPIC_MATCHER
              value: "blink-matcher-application"
            - name: KAFKA_GROUP_MATCHER
              value: "blink-matcher-application"
            - name: RULE_CONFIG_DIR
              value: "/plugins/rules"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            - name: plugins
              mountPath: /plugins
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: plugins
          hostPath:
            path: /blink/plugins
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: blink-event-matcher-application
  namespace: blink
spec:
  selector:
    app: blink-event-matcher-application
  ports:
    - name: http
      port: 8080
      targetPort: 8080
